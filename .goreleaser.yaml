# goreleaser config for aipim
# Local snapshot: `goreleaser release --snapshot --clean`
# Local check:    `goreleaser check`
# Requires goreleaser >= 2.0.

version: 2

project_name: aipim

before:
  hooks:
    - go mod tidy

builds:
  - id: aipim
    main: .
    binary: aipim
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/victorseara/aipim/cmd.Version={{.Version}}
      - -X github.com/victorseara/aipim/cmd.Commit={{.ShortCommit}}
      - -X github.com/victorseara/aipim/cmd.Date={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: victorseara
    name: aipim
  draft: false
  prerelease: auto
  header: |
    ## aipim {{ .Tag }}

    Download the appropriate binary for your platform below.

    **Quick install (curl):**
    ```bash
    curl -L https://github.com/victorseara/aipim/releases/download/{{ .Tag }}/aipim_{{ trimprefix .Tag "v" }}_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz | tar xz
    sudo mv aipim /usr/local/bin/
    ```

    **Or with Go:**
    ```bash
    go install github.com/victorseara/aipim@{{ .Tag }}
    ```
  footer: |
    **Full Changelog:** https://github.com/victorseara/aipim/compare/{{ .PreviousTag }}...{{ .Tag }}

